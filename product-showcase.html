<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --text: #e8e8f0;
    --muted: #8888aa;
    --tag-bg: #1e1e2e;
    --radius: 16px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 10;
  }
  .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  nav { display: flex; gap: 8px; }
  nav button {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 7px 18px; border-radius: 100px; font-size: 0.85rem; cursor: pointer;
    transition: all .2s;
  }
  nav button:hover, nav button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── HERO ── */
  .hero {
    padding: 72px 40px 48px;
    text-align: center;
    background: radial-gradient(ellipse at 50% 0%, rgba(108,99,255,.15) 0%, transparent 60%);
  }
  .hero-eyebrow { font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; color: var(--accent2); margin-bottom: 16px; }
  .hero h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(2rem, 5vw, 3.4rem);
    font-weight: 700; letter-spacing: -1.5px; line-height: 1.1;
    margin-bottom: 16px;
  }
  .hero h1 em { font-style: normal; color: var(--accent); }
  .hero p { color: var(--muted); max-width: 500px; margin: 0 auto; line-height: 1.7; }

  /* ── FILTER TABS ── */
  .filters {
    display: flex; gap: 10px; padding: 0 40px 32px;
    justify-content: center; flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); padding: 8px 20px; border-radius: 100px;
    font-size: 0.85rem; cursor: pointer; transition: all .2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding: 0 40px 60px;
    max-width: 1300px;
    margin: 0 auto;
  }

  /* ── PRODUCT CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform .25s, border-color .25s, box-shadow .25s;
    position: relative;
  }
  .card:hover {
    transform: translateY(-6px);
    border-color: var(--accent);
    box-shadow: 0 20px 60px rgba(108,99,255,.2);
  }
  .card-badge {
    position: absolute; top: 14px; left: 14px;
    background: var(--accent2); color: #000;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 1px;
    padding: 4px 10px; border-radius: 100px; text-transform: uppercase;
  }
  .card-badge.hot { background: #ff4d6d; color: #fff; }
  .card-badge.sale { background: #ffd60a; color: #000; }

  .card-img {
    width: 100%; height: 200px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1e1e2e 0%, #13131a 100%);
    font-size: 5rem;
    padding: 20px;
  }
  .card-body { padding: 20px; }
  .card-category { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 8px; font-weight: 600; }
  .card-name { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
  .card-tagline { font-size: 0.83rem; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-price { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--accent2); }
  .card-price s { font-size: 0.85rem; color: var(--muted); margin-left: 6px; font-weight: 400; }
  .card-cta {
    background: var(--accent); color: #fff;
    border: none; padding: 9px 18px; border-radius: 100px;
    font-size: 0.82rem; font-weight: 600; cursor: pointer;
    transition: background .2s, transform .1s;
  }
  .card-cta:hover { background: #7c73ff; transform: scale(1.04); }

  /* ── MODAL OVERLAY ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%; max-width: 860px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(30px) scale(0.97);
    transition: transform .3s;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-header {
    position: sticky; top: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 28px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 2;
  }
  .modal-header-left { display: flex; align-items: center; gap: 14px; }
  .modal-emoji { font-size: 2rem; }
  .modal-category { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); font-weight: 600; }
  .modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.35rem; font-weight: 700; }
  .modal-close {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); width: 38px; height: 38px; border-radius: 50%;
    font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .2s;
    flex-shrink: 0;
  }
  .modal-close:hover { background: #ff4d6d; border-color: #ff4d6d; }

  .modal-body { padding: 28px; }
  .modal-top { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 32px; }
  @media(max-width:640px){ .modal-top { grid-template-columns: 1fr; } }

  .modal-img-wrap {
    background: linear-gradient(135deg, var(--card) 0%, #0f0f18 100%);
    border-radius: 14px; height: 220px;
    display: flex; align-items: center; justify-content: center; font-size: 7rem;
    border: 1px solid var(--border);
  }
  .modal-meta { display: flex; flex-direction: column; justify-content: center; gap: 14px; }
  .modal-price-tag { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; color: var(--accent2); }
  .modal-desc { font-size: 0.9rem; color: var(--muted); line-height: 1.7; }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .tag {
    background: var(--tag-bg); border: 1px solid var(--border);
    color: var(--muted); font-size: 0.75rem; padding: 4px 12px; border-radius: 100px;
  }
  .tag.accent { border-color: var(--accent); color: var(--accent); }

  /* Specs */
  .specs-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem; font-weight: 700;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
    color: var(--text);
  }
  .specs-title::after {
    content:''; flex:1; height:1px; background: var(--border);
  }

  .specs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }
  .spec-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: border-color .2s;
  }
  .spec-item:hover { border-color: var(--accent); }
  .spec-key { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
  .spec-val { font-size: 0.9rem; font-weight: 600; color: var(--text); line-height: 1.4; }

  .modal-action {
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .btn-primary {
    background: var(--accent); color: #fff;
    border: none; padding: 13px 28px; border-radius: 100px;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    transition: background .2s;

  .btn-primary:hover { background: #7c73ff; }
  .btn-secondary {
    background: none; color: var(--text);
    border: 1px solid var(--border); padding: 13px 28px; border-radius: 100px;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    transition: border-color .2s;
  }
  .btn-secondary:hover { border-color: var(--accent); }

  @media(max-width:600px){
    header { padding: 16px 20px; }
    .hero, .grid, .filters { padding-left: 20px; padding-right: 20px; }
    nav { display: none; }
  }
</style>
</head>

function renderCards(filter = 'all') {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = '';
  const list = filter === 'all' ? products : products.filter(p => p.category === filter);
  list.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(p.id);
    card.innerHTML = `
      ${p.badge ? `<div class="card-badge ${p.badgeType}">${p.badge}</div>` : ''}
      <div class="card-img">${p.emoji}</div>
      <div class="card-body">
        <div class="card-category">${p.category === 'phone' ? 'Smartphone' : p.category === 'laptop' ? 'Laptop' : p.category === 'audio' ? 'Audio' : 'Tablet'}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-tagline">${p.tagline}</div>
        <div class="card-footer">
          <div class="card-price">${p.price} ${p.oldPrice ? `<s>${p.oldPrice}</s>` : ''}</div>
          <button class="card-cta">View Specs →</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function openModal(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  document.getElementById('mEmoji').textContent = p.emoji;
  document.getElementById('mCategory').textContent = p.category === 'phone' ? 'Smartphone' : p.category === 'laptop' ? 'Laptop' : p.category === 'audio' ? 'Audio' : 'Tablet';
  document.getElementById('mTitle').textContent = p.name;
  document.getElementById('mImg').textContent = p.emoji;
  document.getElementById('mPrice').textContent = p.price;
  document.getElementById('mDesc').textContent = p.desc;
  document.getElementById('mTags').innerHTML = p.tags.map(t => `<span class="tag accent">${t}</span>`).join('');
  document.getElementById('mSpecs').innerHTML = p.specs.map(s =>
    `<div class="spec-item"><div class="spec-key">${s.k}</div><div class="spec-val">${s.v}</div></div>`
  ).join('');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(null); });

function filterCards(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(cat);
}

renderCards();
</script>
